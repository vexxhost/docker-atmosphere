name: Build and push Docker image
description: Build and push a multi-arch Docker image to GHCR

inputs:
  image-name:
    description: 'Name of the image (e.g., nova, keystone)'
    required: true
  build-args:
    description: 'List of build-time variables'
    required: false
  build-contexts:
    description: 'List of additional build contexts (e.g., name=path)'
    required: false
  platforms:
    description: 'List of target platforms for build'
    required: false
    default: 'linux/amd64,linux/arm64'
  push:
    description: 'Push is a shorthand for --output=type=registry'
    required: false
    default: 'false'
  save:
    description: 'Save the image to the Depot ephemeral registry'
    required: false
    default: 'false'
outputs:
  imageid:
    description: 'Image ID'
    value: ${{ steps.build.outputs.imageid }}
  digest:
    description: 'Image digest'
    value: ${{ steps.build.outputs.digest }}
  metadata:
    description: 'Build result metadata'
    value: ${{ steps.build.outputs.metadata }}
  version:
    description: 'Docker image version'
    value: ${{ steps.meta.outputs.version }}
  tags:
    description: 'Docker tags'
    value: ${{ steps.meta.outputs.tags }}
  build-id:
    description: 'Depot build ID (for use with depot/pull-action)'
    value: ${{ steps.build.outputs.build-id }}

runs:
  using: composite
  steps:
    - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      id: image-metadata
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
      with:
        script: |
          const versionArgument = `${process.env.IMAGE_NAME
            .toUpperCase()
            .replace(/[^A-Z0-9]/g, '_')}_VERSION`;

          let version = '';
          try {
            const response = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'Dockerfile',
              ref: context.sha,
            });
            if (!Array.isArray(response.data) && response.data.content) {
              const dockerfile = Buffer.from(
                response.data.content,
                response.data.encoding,
              ).toString();
              const match = dockerfile.match(
                new RegExp(`^ARG ${versionArgument}=(\\S+)$`, 'm'),
              );
              version = match?.[1] || '';
            }
          } catch (error) {
            if (error.status !== 404) {
              throw error;
            }
          }

          let latestStable = '';
          if (version) {
            const branches = await github.paginate(
              github.rest.repos.listBranches,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            );
            latestStable = branches
              .map(({ name }) => {
                const match = name.match(/^stable\/(\d{4})\.(\d+)$/);
                return match
                  ? { name, year: Number(match[1]), cycle: Number(match[2]) }
                  : null;
              })
              .filter(Boolean)
              .sort((a, b) => b.year - a.year || b.cycle - a.cycle)[0]?.name || '';
          }

          core.setOutput('version', version);
          core.setOutput(
            'publish-latest',
            Boolean(latestStable && context.ref === `refs/heads/${latestStable}`),
          );

    - uses: step-security/depot-setup-action@b4aca7ffc00ee3722a62991ae7a7f32f20ea225a # v1.7.1

    - uses: step-security/docker-login-action@164e21d7e52229904128e2f946001cb88278c33d # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      id: meta
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
        tags: |
          type=raw,value=latest,enable=${{ (steps.image-metadata.outputs.version == '' && github.ref_name == github.event.repository.default_branch) || steps.image-metadata.outputs.publish-latest == 'true' }}
          type=sha,prefix=
          type=ref,event=branch
          type=match,pattern=stable/(.*),group=1,value={{branch}}
          type=ref,event=pr
          type=raw,value=${{ steps.image-metadata.outputs.version }},enable=${{ steps.image-metadata.outputs.version != '' && github.ref_name != github.event.repository.default_branch }}

    - uses: depot/build-push-action@9785b135c3c76c33db102e45be96a25ab55cd507 # v1.16.2
      id: build
      with:
        project: xcdwcljcld
        build-args: ${{ inputs.build-args }}
        build-contexts: ${{ inputs.build-contexts }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        save: ${{ inputs.save }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - uses: ubie-oss/comment-to-merged-pr-action@947981079c7889504e28088fb38649bc5218e28d # v0.4.0
      if: inputs.push == 'true'
      with:
        github-token: ${{ github.token }}
        message: |-
          This pull request has been included in the following image tags:

          ```
          ${{ steps.meta.outputs.tags }}
          ```

          **Digest:** `ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}`
