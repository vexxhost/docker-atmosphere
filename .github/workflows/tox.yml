name: tox

on:
  workflow_call:
    inputs:
      repository:
        type: string
        required: true
      ref:
        type: string
        required: true

jobs:
  tox:
    name: ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - pep8
          - py3
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@5923a8fba3a98cf17e36583cc498d5e70a01c482 # main
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - run: uv tool install bindep
      - run: sudo apt-get update
      - run: |
          if [ -f bindep.txt ] || [ -f other-requirements.txt ]; then
            packages="$(bindep -b test "${{ matrix.env }}" || true)"
            if [ -n "$packages" ]; then
              sudo apt-get install -y $packages
            fi
            bindep -b test "${{ matrix.env }}"
          fi
        working-directory: ${{ inputs.repository }}
      - run: uv tool install tox --with tox-uv
      - run: tox --runner virtualenv -e ${{ matrix.env }}
        working-directory: ${{ inputs.repository }}
